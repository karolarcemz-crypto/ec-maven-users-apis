name: workflow dockerhubf
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          disribution: 'tenurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to DockerHubf
        run: echo "${{ secrets.DOCKERHUB_TOKEN1 }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
        
